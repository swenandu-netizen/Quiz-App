<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Gallery - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Titan+One&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5b6af2">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ✅ Branding & Header Section */
        .branding-container {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: #5b6af2;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: -5px;
            opacity: 0.9;
        }

        .header-title {
            font-size: 44px;
            color: #1a1a3d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 0;
        }

        /* ✅ Button Base Styles */
        .math-card {
            width: 88%;
            height: 105px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            opacity: 0; 
            animation: slideIn 0.6s ease-out forwards;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        /* 🟢 Hover & Click Effects */
        .math-card:hover:not(:active) {
            transform: scale(1.04) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        .math-card:active {
            transform: scale(0.96) translateY(2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-text {
            color: white;
            font-family: 'Titan One', cursive;
            font-size: 26px;
            letter-spacing: 2px;
        }

        /* ✅ Buttons Colors & Shapes */
        .btn-additional {
            background-color: #0d0d2b;
            align-self: flex-end;
            border-radius: 100px 0 0 100px;
            padding-left: 30px;
        }

        .btn-subtraction {
            background-color: #ff0000;
            align-self: flex-start;
            border-radius: 0 100px 100px 0;
            padding-right: 30px;
        }

        .btn-multiplication {
            background-color: #2e7d32;
            align-self: flex-end;
            border-radius: 100px 0 0 100px;
            padding-left: 30px;
        }

        .btn-division {
            background-color: #ff9800;
            align-self: flex-start;
            border-radius: 0 100px 100px 0;
            padding-right: 30px;
        }

        /* ✅ Animation Delays */
        .math-card:nth-child(2) { animation-delay: 0.1s; }
        .math-card:nth-child(3) { animation-delay: 0.2s; }
        .math-card:nth-child(4) { animation-delay: 0.3s; }
        .math-card:nth-child(5) { animation-delay: 0.4s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Left buttons ke liye slide from left animation override */
        .btn-subtraction, .btn-division {
            animation-name: slideInLeft;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

    </style>
    <link rel="manifest" href="manifest.json">
    
</head>
<body>

    <div class="container">
        <div class="branding-container">
            <span class="brand-name">®nandesh</span>
            <h1 class="header-title">Maths Gallary</h1>
        </div>

        <button class="math-card btn-additional" onclick="goToPage('addition.html')">
            <span class="card-text">ADDITIONAL</span>
        </button>

        <button class="math-card btn-subtraction" onclick="goToPage('subtraction.html')">
            <span class="card-text">SUBTRACTION</span>
        </button>

        <button class="math-card btn-multiplication" onclick="goToPage('multiplication.html')">
            <span class="card-text">MULTIPLICATION</span>
        </button>

        <button class="math-card btn-division" onclick="goToPage('division.html')">
            <span class="card-text">DIVISION</span>
        </button>
    </div>

    <script>
        function goToPage(url) {
            // Screen transition effect ke liye thoda delay (optional)
            setTimeout(() => {
                window.location.href = url;
            }, 150);
        }
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Install feature active!'))
        .catch(err => console.log('Registration failed', err));
    });
  }
</script>
</body>
</html>
