<!DOCTYPE html>
<html lang="hi">
<head>
  <title>Math Masti Division</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f7d2d8;
      --card-bg: #FFFFFF;
      --primary-purple: #5b6af2;
      --primary-dark: #4a59d1;
      --text-dark: #333;
      --text-red: #d9534f;
      --text-blue: #5b6af2;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ✅ HEADER STYLING */
    header {
      width: 100%;
      background: linear-gradient(135deg, var(--primary-purple), #7b88ff);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(91, 106, 242, 0.3);
      box-sizing: border-box;
    }

    .header-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin: 0;
      text-transform: uppercase;
      text-align: center;
      flex-grow: 1;
    }

    .back-home-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      transition: 0.3s;
    }

    .back-home-btn:hover { background: white; color: var(--primary-purple); }

    /* ✅ SELECTION SCREEN */
    #selection-screen {
      width: 100%;
      max-width: 500px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-sizing: border-box;
    }

    .selection-card {
      background: white;
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .day-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .day-btn {
      padding: 18px;
      background: white;
      border: 2px solid var(--primary-purple);
      color: var(--primary-purple);
      border-radius: 15px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .day-btn:hover { background: var(--primary-purple); color: white; }

    /* ✅ QUIZ SCREEN */
    #quiz-screen { display: none; width: 100%; }

    #quiz-container { padding: 20px; display: flex; justify-content: center; width: 100%; box-sizing: border-box; }
    
    .card {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 30px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .info-bar {
      display: flex;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 2px dashed #e0e0e0;
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 18px;
    }

    .question-box {
      background-color: #fffbef;
      border-radius: 20px;
      padding: 30px 15px;
      margin-bottom: 20px;
      border: 1px solid #f0e6c8;
      text-align: center;
    }

    .question { font-size: 32px; font-weight: 600; color: var(--text-dark); margin: 0; }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    
    button.option {
      width: 100%; padding: 18px; border: none; background: var(--primary-purple);
      color: white; border-radius: 15px; cursor: pointer; font-size: 20px; font-weight: 600;
      box-shadow: 0 5px 0 var(--primary-dark);
      transition: 0.1s;
    }

    button.option:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }
    
    .correct { background: #4CAF50 !important; box-shadow: 0 5px 0 #388e3c !important; }
    .wrong { background: #f44336 !important; box-shadow: 0 5px 0 #d32f2f !important; }

    #next-btn {
      width: 100%; padding: 15px; background: white; color: var(--primary-purple);
      border: 2px solid var(--primary-purple); border-radius: 15px;
      font-weight: bold; font-size: 18px; cursor: pointer; display: none;
    }

    .header-spacer { width: 80px; }
  </style>
</head>
<body>

  <div id="selection-screen">
    <div class="selection-card">
      <h2 style="color: var(--primary-purple); margin: 0;">Addition MASTI QUIZ</h2>
      <p style="color: #666; font-weight: bold;">अपनी चुनौती चुनें</p>
      <div id="day-buttons" class="day-grid">
        <p id="loading-msg">Loading Challenges...</p>
      </div>
    </div>
  </div>

  <div id="quiz-screen">
    <header>
      <button class="back-home-btn" onclick="goHome()">🏠 HOME</button>
      <h2 class="header-title" id="current-day-title">DAY 1</h2>
      <div class="header-spacer"></div> 
    </header>

    <div id="quiz-container">
      <div id="quiz-content" class="card">
        </div>
    </div>
  </div>

<script>
const SHEET_ID = "1m06XfMvZrH5GJu3lcCHfLTYCQdIUWF5Fw48HWYX39Wc";
let questions = [];
let currentQuestionIndex = 0;
let score = 0;

// ✅ DIN SELECTION SETUP (Ek baar load hoga)
async function initSelection() {
  const container = document.getElementById("day-buttons");
  
  // Pehle check karein agar buttons pehle se bane hain toh load na karein
  if (container.querySelectorAll('.day-btn').length > 0) return;

  let dayNum = 1;
  let checking = true;

  while (checking && dayNum <= 10) {
    let sheetName = `Add-Day${dayNum}`;
    let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
    try {
      let res = await fetch(url);
      let text = await res.text();
      if (res.ok && text.length > 20 && !text.includes("error") && !text.includes("html")) {
        // Loading message hatao jab pehla din mil jaye
        if(dayNum === 1) document.getElementById("loading-msg").style.display = "none";
        
        let btn = document.createElement("button");
        btn.className = "day-btn";
        btn.innerText = `Day ${dayNum}`;
        
        let displayName = `Day ${dayNum}`;
        btn.onclick = () => startQuiz(sheetName, displayName);
        
        container.appendChild(btn);
        dayNum++;
      } else { checking = false; }
    } catch (e) { checking = false; }
  }
}

initSelection();

// ✅ QUIZ START
function startQuiz(sheetName, title) {
  document.getElementById("selection-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "block";
  document.getElementById("current-day-title").innerText = title.toUpperCase();
  
  // Quiz UI reset
  resetQuizUI();
  loadData(sheetName);
}

// ✅ HOME PAR JANA (No Reload)
function goHome() {
  document.getElementById("selection-screen").style.display = "flex";
  document.getElementById("quiz-screen").style.display = "none";
}

// Quiz UI ko default state mein laane ke liye
function resetQuizUI() {
  document.getElementById("quiz-content").innerHTML = `
    <div class="info-bar">
      <div style="color:var(--text-red)">सवाल: <span id="current-idx">0</span> / <span id="total-qs">0</span></div>
      <div style="color:var(--text-blue)">स्कोर: <span id="score">0</span></div>
    </div>
    <div class="question-box"><p class="question" id="question-text">Loading...</p></div>
    <div id="options-grid" class="options-grid"></div>
    <button id="next-btn" onclick="nextQuestion()">अगला सवाल ➜</button>
  `;
}

function loadData(sheetName) {
  questions = [];
  currentQuestionIndex = 0;
  score = 0;

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  fetch(url).then(res => res.text()).then(csv => {
    let rows = csv.trim().split("\n");
    rows.forEach(row => {
      let cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
      if(cols && cols.length >= 6) {
        questions.push({
          q: cols[0].replace(/"/g, ''),
          opts: [cols[1], cols[2], cols[3], cols[4]].map(o => o.replace(/"/g, '').trim()),
          ans: cols[5].replace(/"/g, '').trim()
        });
      }
    });
    if(questions.length > 0) {
      document.getElementById("total-qs").innerText = questions.length;
      showQuestion();
    }
  });
}

function showQuestion() {
  let data = questions[currentQuestionIndex];
  document.getElementById("current-idx").innerText = currentQuestionIndex + 1;
  document.getElementById("score").innerText = score;
  document.getElementById("question-text").innerText = data.q;
  
  let grid = document.getElementById("options-grid");
  grid.innerHTML = "";
  data.opts.forEach(opt => {
    grid.innerHTML += `<button class="option" onclick="checkAns(this, '${data.ans.replace(/'/g, "\\'")}')">${opt}</button>`;
  });
  document.getElementById("next-btn").style.display = "none";
}

function checkAns(btn, correct) {
  let options = document.querySelectorAll(".option");
  options.forEach(b => b.disabled = true);
  if(btn.innerText.trim() === correct) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
    options.forEach(b => { if(b.innerText.trim() === correct) b.classList.add("correct"); });
  }
  document.getElementById("score").innerText = score;
  document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
  currentQuestionIndex++;
  if(currentQuestionIndex < questions.length) {
    showQuestion();
  } else {
    // Finish Screen
    document.getElementById("quiz-content").innerHTML = `
      <div style="text-align:center; padding: 20px;">
        <h2 style="color:var(--primary-purple); font-size: 32px; margin-top:0;">शानदार! 🎉</h2>
        <p style="font-size: 22px; font-weight:bold; color:#444;">आपका स्कोर: ${score} / ${questions.length}</p>
        <button onclick="goHome()" style="background:var(--primary-purple); color:white; border:none; padding:18px; border-radius:15px; font-weight:bold; width:100%; font-size:18px; cursor:pointer; box-shadow: 0 5px 0 var(--primary-dark);">BACK TO HOME</button>
      </div>
    `;
  }
}
</script>
</body>
</html>
